name: Mortgage Rate Monitor

# Controls when the workflow will run
on:
  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:
  # The 'schedule' event defines the recurring trigger
  schedule:
    # Runs at 14:00 UTC (10:00 AM ET) every Monday, Wed and Friday
    - cron: '0 14 * * 1,3,5'

# A workflow run is made up of one or more jobs that can run sequentially or in parallel
jobs:
  # This workflow contains a single job called "run-monitor"
  run-monitor:
    # The type of runner that the job will run on
    runs-on: ubuntu-latest

    # Steps represent a sequence of tasks that will be executed as part of the job
    steps:
      # Checks-out your repository under $GITHUB_WORKSPACE, so your job can access it
      - name: Checkout repository
        uses: actions/checkout@v4


      # Step 2: Set up the Python environment
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'
          
      # Runs a single command using the runners shell
      - name: Run a one-line script
        run: echo Hello, world!

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # Add the 'requests' library needed for Mailgun API calls
          pip install requests -r .github/requirements.txt 
      
      - name: Run Mortgage monitor script
        run: python .github/mortgage-monitor.py
        env:        
          NINJIA_API_KEY: ${{ secrets.NINJIA_API_KEY }}
          API_KEY: ${{ secrets.API_KEY }}
          EMAIL_ADDR: ${{ secrets.EMAIL_ADDRESS }}
          MAILGUN_URI: ${{ secrets.MAILGUN_URI }}
          MAILGUN_SENDER: ${{ secrets.MAILGUN_SENDER }}
